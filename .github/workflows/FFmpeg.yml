name: BuildFFmpeg
on: workflow_dispatch
jobs:
  Build:
    runs-on: ubuntu-20.04
    steps:
      - name: Docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: GetCode
        uses: actions/checkout@v4
        with:
          repository: BtbN/FFmpeg-Builds
      - name: Build
        shell: bash
        run: |
          sed -i 's/\${REPO,,}/btbn\/ffmpeg-builds/g' util/vars.sh
          ./build.sh win64 gpl-shared 7.1
      - name: UploadBin
        uses: actions/upload-artifact@v4
        with:
          path: artifacts
