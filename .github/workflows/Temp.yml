name: Temp
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: typst/svg2pdf
          ref: v0.13.0
          fetch-depth: 1
      - name: Build
        shell: pwsh
        run: |
          cargo build --release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Result
          path: target/release/*
          include-hidden-files: true
