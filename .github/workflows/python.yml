name: Build Python
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: setup
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: 15.9.65
          msbuild-architecture: x64
      - name: Get code
        uses: actions/checkout@v4
        with:
          repository: python/cpython
          ref: refs/tags/v3.10.14
      - name: build
        shell: pwsh
        run: |
          cd PCbuild/
          ./get_externals.bat
          cd ../Tools/msi/
          ./get_externals.bat
          ./buildrelease.bat --skip-doc --skip-msi -o ../../PCbuild/
          cd ../../PCbuild
      - name: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: *.zip

